name: Notify release

# Manual Slack test only. The automated per-package announcement lives inline in the CI
# `release` job — a GitHub Release created with the built-in GITHUB_TOKEN does NOT trigger
# `on: release` workflows (GitHub blocks recursive runs), so this workflow can't be the
# automatic path. It stays for firing a one-off test message without cutting a release.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag, {projectName}@{version}'
        default: '@fmmenchi/notify@0.0.1'
      url:
        description: 'Release URL'
        default: 'https://github.com/fmmenchi/shared-platform'
      body:
        description: 'Release notes (markdown)'
        default: |
          ### Test
          - **notify:** manual test from workflow_dispatch

permissions:
  contents: read

env:
  HUSKY: 0

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      # Build the brick so the script below can import @fmmenchi/notify from dist.
      - run: pnpm nx build @fmmenchi/notify

      - name: Announce the release to Slack
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_URL: ${{ github.event.release.html_url }}
          RELEASE_BODY: ${{ github.event.release.body }}
        run: node .github/scripts/notify-release.mjs
