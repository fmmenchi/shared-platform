name: Security

# Workspace-wide dependency-vulnerability scan, dogfooding @fmmenchi/nx-trivy. Runs as a gate
# on push/PR AND as a weekly audit — re-checking main against the latest vuln DB catches
# newly-disclosed CVEs with no code change. Workspace-level by design (single root lockfile)
# — see ADR-0007.
on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: '0 6 * * 1' # weekly audit — Monday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

env:
  HUSKY: 0

jobs:
  trivy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Trivy DB cache key (daily)
        id: cachekey
        run: echo "date=$(date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      # The Trivy vuln DB refreshes ~daily; cache it so it is not re-downloaded each run. The
      # nx-trivy docker runner bind-mounts this dir when passed as --cacheDir.
      - uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/trivy-cache
          key: trivy-db-${{ steps.cachekey.outputs.date }}
          restore-keys: trivy-db-

      # Dogfood the plugin: docker runner (aquasec/trivy image — no trivy install on the
      # runner), DB persisted via --cacheDir. .trivyignore.yaml at the root is auto-detected.
      - name: Trivy dependency-vulnerability scan (workspace-wide)
        run: |
          mkdir -p "${{ runner.temp }}/trivy-cache"
          pnpm nx run @fmmenchi/nx-trivy:scan-docker --cacheDir="${{ runner.temp }}/trivy-cache"

      # On findings, alert Slack — dogfooding @fmmenchi/nx-notify. Skipped on PRs (the
      # developer sees the red check) and when the Slack secrets are absent. Essential for the
      # weekly audit, which nobody is watching.
      - name: Alert Slack on findings
        if: ${{ failure() && github.event_name != 'pull_request' }}
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          ERROR_MESSAGE: 'Trivy found CRITICAL/HIGH dependency vulnerabilities. Remediate via a pnpm-workspace.yaml override or suppress in .trivyignore.yaml.'
          ERROR_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: pnpm nx run @fmmenchi/nx-notify:announce-error --appName=shared-platform
