name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

env:
  HUSKY: 0

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      # Browser-mode component tests (native <dialog>, real a11y) need Chromium.
      - run: pnpm exec playwright install --with-deps chromium

      - run: pnpm nx sync:check

      - run: pnpm nx format:check --all

      - run: pnpm nx run-many -t typecheck build lint test build-storybook

  # Preview of what `nx release` would publish from the current main — versions,
  # changelogs, GitHub releases. Dry-run ONLY: it never versions, tags or
  # publishes. Informational (does not gate); a real release is still a manual,
  # explicit `nx release` by a maintainer.
  release-preview:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: nx release --dry-run (preview — never publishes)
        run: pnpm nx release --dry-run --skip-publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
