name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

env:
  HUSKY: 0

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      # Browser-mode component tests (native <dialog>, real a11y) need Chromium.
      - run: pnpm exec playwright install --with-deps chromium

      - run: pnpm nx sync:check

      - run: pnpm nx format:check --all

      - run: pnpm nx run-many -t typecheck build lint test build-storybook
