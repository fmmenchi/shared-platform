name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

env:
  HUSKY: 0

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      # Browser-mode component tests (native <dialog>, real a11y) need Chromium.
      - run: pnpm exec playwright install --with-deps chromium

      - run: pnpm nx sync:check

      - run: pnpm nx format:check --all

      - run: pnpm nx run-many -t typecheck build lint test build-storybook

  # Preview on PRs: what `nx release` WOULD publish — versions, changelogs, GitHub
  # releases. Dry-run only, never versions/tags/publishes. Informational.
  release-preview:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: nx release --dry-run (preview — never publishes)
        run: pnpm nx release --dry-run --skip-publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Trunk-based release: every green push to main versions each package from its
  # conventional commits, tags {projectName}@{version}, creates the per-project GitHub
  # Release, publishes to GitHub Packages, and announces each newly cut package on Slack
  # (inline — see the Release/Announce steps). Auth is the built-in GITHUB_TOKEN
  # (contents:write for tags/releases, packages:write to publish) — no PAT.
  release:
    needs: main
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    # Serialize releases: two quick merges must not run `nx release` (tag + push)
    # concurrently and race on the push.
    concurrency:
      group: release
      cancel-in-progress: false
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'pnpm'
          registry-url: 'https://npm.pkg.github.com'

      - run: pnpm install --frozen-lockfile

      # The release step runs the built @fmmenchi/ci affected-releasable script; the
      # announce step dogfoods the @fmmenchi/nx-notify plugin (built on demand via its
      # target's dependsOn).
      - run: pnpm nx build @fmmenchi/ci

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Release
        # Version only the projects nx marks AFFECTED by this push — input-aware (root
        # files like AGENTS.md / workflows aren't project inputs, so they don't cascade)
        # and dependency-aware (dependents are affected; `auto` diffs the lockfile). The
        # CI-only part (resolving the base) lives here; the logic is packages/tools/ci.
        # This replaces nx release's "root files apply to ALL projects" cascade (nx #34542).
        run: |
          before=$(git tag -l '*@*' | sort)
          base='${{ github.event.before }}'
          case "$base" in *[!0]*) ;; *) base=$(git rev-parse HEAD~1) ;; esac  # merge's first parent
          projects=$(BASE="$base" HEAD='${{ github.sha }}' node packages/tools/ci/dist/affected-releasable.js)
          if [ -z "$projects" ]; then
            echo "No releasable project affected — nothing to release."
          else
            echo "Releasing affected projects: $projects"
            pnpm nx release --yes --projects="$projects"
          fi
          comm -13 <(printf '%s\n' "$before") <(git tag -l '*@*' | sort) \
            | sed '/^$/d' > "$RUNNER_TEMP/new_tags.txt"
          echo "Newly released tags:"; cat "$RUNNER_TEMP/new_tags.txt"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # A GitHub Release created with the built-in GITHUB_TOKEN does NOT trigger other
      # workflows (no recursive runs), so a `release: published` listener never fires from
      # here. Announce inline instead, dogfooding the @fmmenchi/nx-notify plugin: one Slack
      # message per newly cut tag, with the notes nx wrote into each GitHub Release as the
      # changelog. Missing Slack secrets skip green.
      - name: Announce releases to Slack
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          failed=0
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            pkg=${tag%@*}       # {projectName}@{version} → strip the trailing @version
            version=${tag##*@}
            body=$(gh release view "$tag" --json body --jq .body 2>/dev/null || true)
            url=$(gh release view "$tag" --json url --jq .url 2>/dev/null || true)
            RELEASE_VERSION="$version" RELEASE_URL="$url" RELEASE_BODY="$body" \
              pnpm nx run @fmmenchi/nx-notify:announce-release --appName="$pkg" || failed=1
          done < "$RUNNER_TEMP/new_tags.txt"
          exit $failed
