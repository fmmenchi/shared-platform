name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

env:
  HUSKY: 0

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      # Browser-mode component tests (native <dialog>, real a11y) need Chromium.
      - run: pnpm exec playwright install --with-deps chromium

      - run: pnpm nx sync:check

      - run: pnpm nx format:check --all

      - run: pnpm nx run-many -t typecheck build lint test build-storybook

  # Preview on PRs: what `nx release` WOULD publish — versions, changelogs, GitHub
  # releases. Dry-run only, never versions/tags/publishes. Informational.
  release-preview:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: nx release --dry-run (preview — never publishes)
        run: pnpm nx release --dry-run --skip-publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Trunk-based release: every green push to main versions each package from its
  # conventional commits, tags {projectName}@{version}, creates the per-project GitHub
  # Release, publishes to GitHub Packages, and announces each newly cut package on Slack
  # (inline — see the Release/Announce steps). Auth is the built-in GITHUB_TOKEN
  # (contents:write for tags/releases, packages:write to publish) — no PAT.
  release:
    needs: main
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    # Serialize releases: two quick merges must not run `nx release` (tag + push)
    # concurrently and race on the push.
    concurrency:
      group: release
      cancel-in-progress: false
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'pnpm'
          registry-url: 'https://npm.pkg.github.com'

      - run: pnpm install --frozen-lockfile

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Release
        # Scope the release to projects whose OWN files changed since their last tag.
        # nx's independent + conventionalCommits attributes root-file changes
        # (pnpm-lock.yaml, workflows) to ALL projects and bumps every one (nx #34542),
        # so we compute the changed set with per-project `git log -- <root>` and pass
        # --projects. A push that touched no project (e.g. only workflows) releases
        # nothing — which also avoids the empty-release push race. nx still bumps
        # dependents of the changed set via updateDependents.
        run: |
          before=$(git tag -l '*@*' | sort)
          changed=()
          for dir in packages/*/*; do
            [ -f "$dir/package.json" ] || continue
            node -e "process.exit(require('./$dir/package.json').private ? 1 : 0)" || continue
            name=$(node -p "require('./$dir/package.json').name")
            tag=$(git tag -l "$name@*" | sort -V | tail -1)
            if [ -z "$tag" ] || [ -n "$(git log "$tag..HEAD" --oneline -- "$dir")" ]; then
              changed+=("$name")
            fi
          done
          if [ ${#changed[@]} -eq 0 ]; then
            echo "No project source changes since the last release — nothing to release."
          else
            joined=$(IFS=,; echo "${changed[*]}")
            echo "Releasing changed projects: $joined"
            pnpm nx release --yes --projects="$joined"
          fi
          comm -13 <(printf '%s\n' "$before") <(git tag -l '*@*' | sort) \
            | sed '/^$/d' > "$RUNNER_TEMP/new_tags.txt"
          echo "Newly released tags:"; cat "$RUNNER_TEMP/new_tags.txt"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # A GitHub Release created with the built-in GITHUB_TOKEN does NOT trigger other
      # workflows (no recursive runs), so a `release: published` listener never fires from
      # here. Announce inline instead: one Slack message per newly cut tag, built from the
      # notes nx wrote into each GitHub Release. Missing Slack secrets skip green.
      - name: Announce releases to Slack
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pnpm nx build @fmmenchi/notify
          failed=0
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            body=$(gh release view "$tag" --json body --jq .body 2>/dev/null || true)
            url=$(gh release view "$tag" --json url --jq .url 2>/dev/null || true)
            RELEASE_TAG="$tag" RELEASE_URL="$url" RELEASE_BODY="$body" \
              node .github/scripts/notify-release.mjs || failed=1
          done < "$RUNNER_TEMP/new_tags.txt"
          exit $failed
