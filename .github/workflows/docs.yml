name: Docs

# Deploy the documentation site (packages/tools/docs, serving doc/ directly)
# WITH the component Storybook under /storybook/ to GitHub Pages, on every
# push to main that touches the docs, the site, or the design system.
on:
  push:
    branches:
      - main
    paths:
      - 'doc/**'
      - 'packages/tools/docs/**'
      - 'packages/client/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let an in-flight deploy finish.
concurrency:
  group: pages
  cancel-in-progress: false

env:
  HUSKY: 0

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm nx run @fmmenchi/docs:build

      # Storybook rides along under /storybook/ (its static build uses
      # relative asset paths, so any subpath works).
      - run: pnpm nx run @fmmenchi/ui:build-storybook
      - run: cp -r packages/client/ui/storybook-static packages/tools/docs/build/storybook

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v4
        with:
          path: packages/tools/docs/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
