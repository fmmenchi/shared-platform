packages:
  - 'packages/*'
  - 'packages/*/*'
  - 'apps/*'
# Force fixed versions of transitive deps flagged by the Trivy scan (all HIGH). Prefer this
# remediation over a .trivyignore.yaml. NB: brace-expansion is scoped to the vulnerable 5.x
# line — a blanket override drags 1.x/2.x consumers to 5.x, whose ESM export breaks their
# `require('brace-expansion')()` call (`expand is not a function`).
overrides:
  axios: '>=1.18.0'
  'brace-expansion@5': '>=5.0.7'
  fast-uri: '>=3.1.4'
  serialize-javascript: '>=7.0.3'
allowBuilds:
  nx: true
  '@swc/core': true
  esbuild: true
  unrs-resolver: false
  core-js: false
